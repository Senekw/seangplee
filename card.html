<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sean Lee, business card</title>
  <meta name="description" content="Sean Lee, Computational Cancer Biology. Katy, Texas." />
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#FFFFFF" />

  <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Crect%20width='32'%20height='32'%20fill='%23FFFFFF'/%3E%3Crect%20x='2.5'%20y='2.5'%20width='27'%20height='27'%20fill='none'%20stroke='%2351E2F5'%20stroke-width='1.5'/%3E%3Ctext%20x='16'%20y='21.5'%20font-family='Georgia,serif'%20font-size='15'%20font-weight='700'%20fill='%2336292F'%20text-anchor='middle'%3ESL%3C/text%3E%3C/svg%3E" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --ink: #0E0E0C;
      --muted: #6A685E;
      --line: rgba(14, 14, 12, 0.14);
      --accent: #0E91AB;
      /* Soft pastel spectrum for the card's top edge. */
      --spectrum: linear-gradient(90deg, #51E2F5, #9DF9EF, #EDF7F6, #FFA8B6, #A28089);
      --serif: "Newsreader", Georgia, "Times New Roman", serif;
      --mono: "IBM Plex Mono", ui-monospace, Menlo, monospace;
      --sans: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; border-radius: 0; margin: 0; }

    html, body { height: 100%; }

    body {
      background: #FFFFFF;
      color: var(--ink);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: 8vmin 6vmin;
      cursor: default;
    }

    /* The card */
    .card {
      width: 100%;
      max-width: 430px;
      background: #FFFFFF;
      border: 1px solid var(--line);
      box-shadow: 0 24px 60px -28px rgba(14, 14, 12, 0.28);
      padding: clamp(2rem, 4vw, 3rem);
      position: relative;
    }
    .card::before {
      content: "";
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 5px;
      background: var(--spectrum);
    }

    .card__mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      border: 1px solid rgba(14, 14, 12, 0.28);
      font-family: var(--mono);
      font-weight: 500;
      font-size: 12px;
      letter-spacing: 0.04em;
      color: var(--ink);
      margin-bottom: 2.25rem;
    }

    .card__name {
      font-family: var(--serif);
      font-weight: 600;
      font-size: clamp(2.4rem, 1.8rem + 3vw, 3rem);
      line-height: 1;
      letter-spacing: -0.02em;
      margin-bottom: 0.7rem;
    }

    .card__title {
      font-family: var(--mono);
      font-size: 11.5px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .card__rule {
      height: 1px;
      background: var(--line);
      margin: 2rem 0;
    }

    .card__rows {
      display: grid;
      gap: 0.95rem;
    }
    .card__row {
      display: grid;
      grid-template-columns: 4.25rem 1fr;
      align-items: baseline;
      gap: 0.75rem;
    }
    .card__label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .card__value {
      font-family: var(--mono);
      font-size: 13.5px;
      letter-spacing: 0.01em;
      color: var(--ink);
      position: relative;
      width: max-content;
      max-width: 100%;
      word-break: break-word;
    }
    a.card__value { transition: color 0.18s cubic-bezier(0.22,0.61,0.36,1); }
    a.card__value::after {
      content: "";
      position: absolute;
      left: 0; bottom: -3px;
      width: 100%; height: 1px;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.22s cubic-bezier(0.22,0.61,0.36,1);
    }
    a.card__value:hover { color: var(--accent); }
    a.card__value:hover::after { transform: scaleX(1); }

    :focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

    @media (max-width: 420px) {
      .card__row { grid-template-columns: 1fr; gap: 0.15rem; }
    }
  </style>
</head>
<body>
  <!-- Clicking the empty space around the card returns to the site. -->
  <main class="card" aria-label="Sean Lee business card" onclick="event.stopPropagation()">
    <span class="card__mark" aria-hidden="true">SL</span>

    <h1 class="card__name">Sean Lee</h1>
    <p class="card__title">Computational Cancer Biology</p>

    <div class="card__rule" role="presentation"></div>

    <div class="card__rows">
      <div class="card__row">
        <span class="card__label">Email</span>
        <a class="card__value" href="mailto:seangplee@gmail.com">seangplee@gmail.com</a>
      </div>
      <div class="card__row">
        <span class="card__label">Phone</span>
        <a class="card__value" href="tel:+13465543199">+1 346 554 3199</a>
      </div>
      <div class="card__row">
        <span class="card__label">Based in</span>
        <span class="card__value">Katy, Texas</span>
      </div>
    </div>
  </main>

  <script>
    /* The page shows nothing but the card; a click on the surrounding
       space takes you back to the site (browser back also works). */
    document.body.addEventListener("click", function () {
      if (document.referrer && document.referrer.indexOf(location.host) !== -1) {
        history.back();
      } else {
        location.href = "index.html";
      }
    });
  </script>
</body>
</html>
